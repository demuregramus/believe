openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Believe Wireless API — powered by SignalWire
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: phone-numbers
    description: Phone number search and provisioning
  - name: plans
    description: Wireless service plans
  - name: messages
    description: SMS messaging
  - name: stats
    description: Platform statistics
  - name: webhooks
    description: SignalWire webhook endpoints
  - name: admin
    description: Admin panel operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /phone-numbers/available:
    get:
      operationId: listAvailableNumbers
      tags: [phone-numbers]
      summary: Search available phone numbers
      parameters:
        - name: areaCode
          in: query
          required: false
          schema: { type: string }
        - name: contains
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List of available phone numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailablePhoneNumber"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /phone-numbers/claim:
    post:
      operationId: claimPhoneNumber
      tags: [phone-numbers]
      summary: Claim a phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhoneNumberClaim"
      responses:
        "201":
          description: Phone number successfully claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimedPhoneNumber"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List available service plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get message history
      parameters:
        - name: phoneNumber
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send an SMS message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signalwire/webhook:
    post:
      operationId: signalwireWebhook
      tags: [webhooks]
      summary: SignalWire inbound message webhook
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            text/xml:
              schema:
                type: string

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/numbers:
    get:
      operationId: adminListNumbers
      tags: [admin]
      summary: Admin — list all claimed numbers
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer }
        - name: offset
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: All claimed numbers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNumbersResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/messages:
    get:
      operationId: adminListMessages
      tags: [admin]
      summary: Admin — list all messages
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer }
        - name: offset
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: All messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMessagesResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean }
      required: [success]

    AvailablePhoneNumber:
      type: object
      properties:
        phoneNumber: { type: string }
        friendlyName: { type: string }
        region: { type: string }
        rateCenter: { type: string }
        monthlyFee: { type: string }
      required: [phoneNumber, friendlyName, region, rateCenter, monthlyFee]

    PhoneNumberClaim:
      type: object
      properties:
        phoneNumber: { type: string }
        userEmail: { type: string }
        userName: { type: string }
      required: [phoneNumber]

    ClaimedPhoneNumber:
      type: object
      properties:
        sid: { type: string }
        phoneNumber: { type: string }
        friendlyName: { type: string }
        status: { type: string }
        claimedAt: { type: string }
      required: [sid, phoneNumber, friendlyName, status, claimedAt]

    Plan:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: string }
        description: { type: string }
        features:
          type: array
          items: { type: string }
        highlight: { type: boolean }
        badge: { type: ["string", "null"] }
      required: [id, name, price, description, features, highlight]

    Message:
      type: object
      properties:
        id: { type: string }
        from: { type: string }
        to: { type: string }
        body: { type: string }
        direction:
          type: string
          enum: [inbound, outbound-api]
        status: { type: string }
        createdAt: { type: string }
      required: [id, from, to, body, direction, status, createdAt]

    MessageInput:
      type: object
      properties:
        from: { type: string }
        to: { type: string }
        body: { type: string }
      required: [from, to, body]

    WebhookPayload:
      type: object
      properties:
        From: { type: string }
        To: { type: string }
        Body: { type: string }
        MessageSid: { type: string }
      required: [From, To, Body]

    Stats:
      type: object
      properties:
        totalNumbersClaimed: { type: integer }
        totalMessagesSent: { type: integer }
        totalUsers: { type: integer }
        coverageStates: { type: integer }
      required: [totalNumbersClaimed, totalMessagesSent, totalUsers, coverageStates]

    AdminCredentials:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    AdminSession:
      type: object
      properties:
        email: { type: string }
        loggedIn: { type: boolean }
      required: [email, loggedIn]

    AdminNumberItem:
      type: object
      properties:
        id: { type: integer }
        sid: { type: string }
        phoneNumber: { type: string }
        friendlyName: { type: string }
        userEmail: { type: ["string", "null"] }
        userName: { type: ["string", "null"] }
        status: { type: string }
        createdAt: { type: string }
      required: [id, sid, phoneNumber, friendlyName, status, createdAt]

    AdminNumbersResponse:
      type: object
      properties:
        numbers:
          type: array
          items:
            $ref: "#/components/schemas/AdminNumberItem"
        total: { type: integer }
      required: [numbers, total]

    AdminMessageItem:
      type: object
      properties:
        id: { type: integer }
        sid: { type: string }
        from: { type: string }
        to: { type: string }
        body: { type: string }
        direction: { type: string }
        status: { type: string }
        createdAt: { type: string }
      required: [id, sid, from, to, body, direction, status, createdAt]

    AdminMessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AdminMessageItem"
        total: { type: integer }
      required: [messages, total]
