kind = "web"
previewPath = "/"
title = "Believe Wireless"
version = "1.0.0"
id = "artifacts/believe-wireless"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20077

[services.development]
run = "pnpm --filter @workspace/believe-wireless run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/believe-wireless", "run", "build" ]
serve = "static"
publicDir = "artifacts/believe-wireless/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20077"
BASE_PATH = "/"
